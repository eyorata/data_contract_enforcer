version: 2
models:
- name: week3_extractions
  description: One record per processed document. Each record contains all facts extracted from the source document and the
    entities referenced.
  columns:
  - name: doc_id
    tests:
    - not_null
    - unique
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
  - name: source_path
    tests:
    - not_null
  - name: source_hash
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[a-f0-9]{64}$
  - name: extracted_facts
    tests:
    - not_null
  - name: extracted_facts_confidence
    description: Confidence score (flattened)
    tests:
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0.0
        max_value: 1.0
  - name: entities_type
    description: Entity type (flattened)
    tests:
    - accepted_values:
        values:
        - DATE
        - LOCATION
        - PERSON
  - name: extraction_model
    tests:
    - not_null
  - name: processing_time_ms
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 1
  - name: extracted_at
    tests:
    - not_null
