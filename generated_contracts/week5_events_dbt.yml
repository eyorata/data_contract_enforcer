version: 2
models:
- name: week5_events
  description: One record per event for each aggregate.
  columns:
  - name: event_id
    tests:
    - not_null
    - unique
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
  - name: event_type
    tests:
    - not_null
    - accepted_values:
        values:
        - AgentInputValidated
        - AgentNodeExecuted
        - AgentOutputWritten
        - AgentSessionCompleted
        - AgentSessionStarted
        - AgentToolCalled
        - ApplicationApproved
        - ApplicationDeclined
        - ApplicationSubmitted
        - ComplianceCheckCompleted
        - ComplianceCheckInitiated
        - ComplianceCheckRequested
        - ComplianceRuleFailed
        - ComplianceRuleNoted
        - ComplianceRulePassed
        - CreditAnalysisCompleted
        - CreditAnalysisRequested
        - CreditRecordOpened
        - DecisionGenerated
        - DecisionRequested
        - DocumentAdded
        - DocumentFormatValidated
        - DocumentUploadRequested
        - DocumentUploaded
        - ExtractedFactsConsumed
        - ExtractionCompleted
        - ExtractionStarted
        - FraudScreeningCompleted
        - FraudScreeningInitiated
        - FraudScreeningRequested
        - HistoricalProfileConsumed
        - PackageCreated
        - PackageReadyForAnalysis
        - QualityAssessmentCompleted
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[A-Z][A-Za-z0-9]*$
  - name: aggregate_id
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
  - name: aggregate_type
    tests:
    - not_null
    - accepted_values:
        values:
        - AgentSession
        - ComplianceRecord
        - CreditRecord
        - DocumentPackage
        - FraudScreening
        - LoanApplication
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[A-Z][A-Za-z0-9]*$
  - name: sequence_number
    tests:
    - not_null
  - name: payload
    tests:
    - not_null
  - name: metadata_correlation_id
    description: Correlation ID (flattened)
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
  - name: metadata_user_id
    tests:
    - not_null
  - name: metadata_source_service
    tests:
    - not_null
  - name: schema_version
    tests:
    - not_null
  - name: occurred_at
    tests:
    - not_null
  - name: recorded_at
    tests:
    - not_null
    - dbt_expectations.expect_column_pair_values_A_to_be_greater_than_B:
        column_A: recorded_at
        column_B: occurred_at
        or_equal: true
