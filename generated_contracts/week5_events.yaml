kind: DataContract
apiVersion: v3.0.0
id: week5-event-sourcing-events
primary_key: event_id
info:
  title: Week 5 Event Sourcing — Event Records
  version: 1.0.0
  owner: week5-team
  description: One record per event for each aggregate.
  generated_at: '2026-04-04T07:28:46Z'
servers:
  local:
    type: local
    path: outputs/week5/events.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract.
  limitations: Sequence numbers must be monotonic per aggregate.
schema:
  event_id:
    type: string
    format: uuid
    required: true
    unique: true
  event_type:
    type: string
    required: true
    enum: &id001
    - AgentInputValidated
    - AgentNodeExecuted
    - AgentOutputWritten
    - AgentSessionCompleted
    - AgentSessionStarted
    - AgentToolCalled
    - ApplicationApproved
    - ApplicationDeclined
    - ApplicationSubmitted
    - ComplianceCheckCompleted
    - ComplianceCheckInitiated
    - ComplianceCheckRequested
    - ComplianceRuleFailed
    - ComplianceRuleNoted
    - ComplianceRulePassed
    - CreditAnalysisCompleted
    - CreditAnalysisRequested
    - CreditRecordOpened
    - DecisionGenerated
    - DecisionRequested
    - DocumentAdded
    - DocumentFormatValidated
    - DocumentUploadRequested
    - DocumentUploaded
    - ExtractedFactsConsumed
    - ExtractionCompleted
    - ExtractionStarted
    - FraudScreeningCompleted
    - FraudScreeningInitiated
    - FraudScreeningRequested
    - HistoricalProfileConsumed
    - PackageCreated
    - PackageReadyForAnalysis
    - QualityAssessmentCompleted
  aggregate_id:
    type: string
    format: uuid
    required: true
  aggregate_type:
    type: string
    required: true
    enum: &id002
    - AgentSession
    - ComplianceRecord
    - CreditRecord
    - DocumentPackage
    - FraudScreening
    - LoanApplication
  sequence_number:
    type: integer
    required: true
  payload:
    type: object
    required: true
  metadata:
    type: object
    required: true
    properties:
      causation_id:
        type: string
        nullable: true
      correlation_id:
        type: string
        required: true
      user_id:
        type: string
        required: true
      source_service:
        type: string
        required: true
  schema_version:
    type: string
    required: true
  occurred_at:
    type: string
    format: date-time
    required: true
  recorded_at:
    type: string
    format: date-time
    required: true
quality:
  engine: custom
  checks:
  - id: week5.event_id.uuid
    column: event_id
    type: regex
    pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
    severity: CRITICAL
  - id: week5.event_type.pascal
    column: event_type
    type: regex
    pattern: ^[A-Z][A-Za-z0-9]*$
    severity: CRITICAL
  - id: week5.event_type.registry
    column: event_type
    type: enum
    allowed: *id001
    severity: HIGH
  - id: week5.aggregate_id.uuid
    column: aggregate_id
    type: regex
    pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
    severity: CRITICAL
  - id: week5.aggregate_type.enum
    column: aggregate_type
    type: enum
    allowed: *id002
    severity: HIGH
  - id: week5.sequence.monotonic
    column: sequence_number
    type: monotonic_sequence
    group_by: aggregate_id
    severity: CRITICAL
    observed:
      min: 0
      max: 11
      mean: 4.185165
      stddev: 3.098306
      p25: 1.0
      p50: 4.0
      p75: 7.0
      p95: 10.0
      p99: 11.0
      count: 1847
  - id: week5.recorded_at.gte_occurred_at
    column: recorded_at
    type: gte_field
    other_column: occurred_at
    severity: CRITICAL
  - id: week5.metadata.correlation_id.uuid
    column: metadata.correlation_id
    type: regex
    pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
    severity: HIGH
  - id: week5.metadata.source_service.required
    column: metadata.source_service
    type: required
    severity: HIGH
  - id: week5.payload.object
    column: payload
    type: type
    expected_type: object
    severity: HIGH
lineage:
  upstream:
  - id: week3-document-refinery-extractions
    fields_consumed:
    - doc_id
    - extracted_facts
  - id: week4-cartographer-lineage
    fields_consumed:
    - nodes
    - edges
  downstream:
  - id: week7-schema-contract
    description: Week 7 enforcer validates event payload schemas.
    fields_consumed:
    - event_type
    - payload
    - schema_version
    breaking_if_changed:
    - event_type
    - payload
