# contract_registry/subscriptions.yaml
# Every inter-system data dependency must be listed here.
# A subscription is a consumer's formal declaration of dependency.

subscriptions:
  # Week 1 -> Week 3
  - contract_id: week1-intent-classifier-records
    subscriber_id: week3-document-refinery
    subscriber_team: week3
    fields_consumed: [intent_id, code_refs, intent]
    breaking_fields:
      - field: code_refs.confidence
        reason: used for extraction prioritization; scale change breaks ranking logic
      - field: intent_id
        reason: primary key used to link intents to extraction records
    validation_mode: ENFORCE
    registered_at: '2026-03-01T09:00:00Z'
    contact: week3-team@org.com

  # Week 3 -> Week 4
  - contract_id: week3-document-refinery-extractions
    subscriber_id: week4-cartographer
    subscriber_team: week4
    fields_consumed: [doc_id, extracted_facts, extraction_model]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: used for node ranking; scale change breaks ranking logic
      - field: doc_id
        reason: primary key for node identity in lineage graph
    validation_mode: ENFORCE
    registered_at: '2026-03-01T09:00:00Z'
    contact: week4-team@org.com

  # Week 3 -> Week 5
  - contract_id: week3-document-refinery-extractions
    subscriber_id: week5-event-sourcing
    subscriber_team: week5
    fields_consumed: [doc_id, extracted_facts]
    breaking_fields:
      - field: doc_id
        reason: used as correlation key in ExtractedFactsConsumed events
      - field: extracted_facts
        reason: payload content for extraction events; structure change breaks event schema
    validation_mode: ENFORCE
    registered_at: '2026-03-01T09:00:00Z'
    contact: week5-team@org.com

  # Week 3 -> Week 7 (Enforcer)
  - contract_id: week3-document-refinery-extractions
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [extracted_facts.confidence, doc_id, entities]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: AI extension embedding drift check baseline depends on confidence scale
      - field: entities
        reason: referential integrity checks validate entity_refs against entity_ids
    validation_mode: AUDIT
    registered_at: '2026-03-01T09:00:00Z'
    contact: week7-team@org.com

  # Week 4 -> Week 5
  - contract_id: week4-cartographer-lineage
    subscriber_id: week5-event-sourcing
    subscriber_team: week5
    fields_consumed: [nodes, edges]
    breaking_fields:
      - field: nodes.node_id
        reason: used for provenance tracking in event metadata
      - field: edges.relationship
        reason: relationship types drive event routing logic
    validation_mode: ENFORCE
    registered_at: '2026-03-01T09:00:00Z'
    contact: week5-team@org.com

  # Week 4 -> Week 7 (blame chain)
  - contract_id: week4-cartographer-lineage
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [nodes, edges]
    breaking_fields:
      - field: nodes
        reason: BFS blame chain traversal depends on node structure
      - field: edges
        reason: edge traversal required for upstream producer identification
    validation_mode: ENFORCE
    registered_at: '2026-03-01T09:00:00Z'
    contact: week7-team@org.com

  # Week 5 -> Week 7
  - contract_id: week5-event-sourcing-events
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [event_id, event_type, aggregate_id, sequence_number, payload, metadata]
    breaking_fields:
      - field: event_type
        reason: event type registry validation depends on known event types
      - field: sequence_number
        reason: monotonic sequence check per aggregate detects event ordering corruption
      - field: payload
        reason: payload structure validation for AI extension checks
    validation_mode: ENFORCE
    registered_at: '2026-03-01T09:00:00Z'
    contact: week7-team@org.com

  # LangSmith -> Week 7
  - contract_id: langsmith-traces
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [id, run_type, total_tokens, prompt_tokens, completion_tokens, error, outputs]
    breaking_fields:
      - field: run_type
        reason: AI extension checks filter by run_type to assess LLM behavior
      - field: total_tokens
        reason: token accounting validation (total = prompt + completion)
    validation_mode: AUDIT
    registered_at: '2026-03-01T09:00:00Z'
    contact: ai-observability@org.com
