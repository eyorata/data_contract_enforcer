id:
  type: string
  format: uuid
  required: true
  unique: true
name:
  type: string
  required: true
run_type:
  type: string
  enum:
  - chain
  - embedding
  - llm
  - retriever
  - tool
  required: true
parent_run_id:
  type: string
  format: uuid
  nullable: true
session_id:
  type: string
  format: uuid
  required: true
start_time:
  type: string
  format: date-time
  required: true
end_time:
  type: string
  format: date-time
  required: true
status:
  type: string
  enum:
  - error
  - success
  required: true
error:
  type: object
  nullable: true
inputs:
  type: object
  required: true
outputs:
  type: object
  nullable: true
prompt_tokens:
  type: integer
  minimum: 0
  required: true
completion_tokens:
  type: integer
  minimum: 0
  required: true
total_tokens:
  type: integer
  minimum: 0
  required: true
model_name:
  type: string
  nullable: true
latency_ms:
  type: integer
  minimum: 0
  required: true
tags:
  type: array
