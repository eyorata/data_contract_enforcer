intent_id:
  type: string
  format: uuid
  required: true
  unique: true
  description: Primary key. UUIDv4.
session_id:
  type: string
  format: uuid
  required: true
intent:
  type: string
  enum:
  - assess_compliance
  - classify_risk
  - detect_fraud
  - extract_financials
  - summarize_document
  - verify_identity
  required: true
  description: Classified intent category.
code_refs:
  type: array
  min_items: 1
  required: true
  items:
    file:
      type: string
      required: true
    line_start:
      type: integer
      minimum: 1
      required: true
    line_end:
      type: integer
      minimum: 1
      required: true
    symbol:
      type: string
      required: true
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
      required: true
resolved_at:
  type: string
  format: date-time
  required: true
source_text:
  type: string
  required: true
model_version:
  type: string
  required: true
  pattern: ^(claude|gpt)-
